<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ApexEdge social image</title>
  <desc id="desc">ApexEdge offline-first POS hub orchestrator connecting POS and HQ.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.2" stroke="#334155" stroke-width="1">
    <path d="M0 90H1200"/>
    <path d="M0 180H1200"/>
    <path d="M0 270H1200"/>
    <path d="M0 360H1200"/>
    <path d="M0 450H1200"/>
    <path d="M0 540H1200"/>
    <path d="M120 0V630"/>
    <path d="M240 0V630"/>
    <path d="M360 0V630"/>
    <path d="M480 0V630"/>
    <path d="M600 0V630"/>
    <path d="M720 0V630"/>
    <path d="M840 0V630"/>
    <path d="M960 0V630"/>
    <path d="M1080 0V630"/>
  </g>

  <circle cx="980" cy="110" r="170" fill="#0EA5E9" opacity="0.12"/>
  <circle cx="1060" cy="540" r="210" fill="#22D3EE" opacity="0.08"/>

  <text x="72" y="212" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="86" font-weight="700">ApexEdge</text>
  <text x="72" y="260" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="500">
    Offline-first POS Hub Orchestrator
  </text>
  <text x="72" y="302" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="400">
    POS/MPOS -> ApexEdge -> HQ
  </text>

  <g filter="url(#shadow)">
    <rect x="92" y="364" rx="14" ry="14" width="210" height="92" fill="#0F172A" stroke="#334155" stroke-width="2"/>
    <text x="197" y="418" fill="#E2E8F0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="600">POS/MPOS</text>

    <rect x="484" y="338" rx="16" ry="16" width="244" height="144" fill="#0B1220" stroke="url(#accent)" stroke-width="3"/>
    <text x="606" y="395" fill="#67E8F9" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="33" font-weight="700">ApexEdge</text>
    <text x="606" y="430" fill="#94A3B8" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="400">orders | docs | sync</text>

    <rect x="910" y="364" rx="14" ry="14" width="166" height="92" fill="#0F172A" stroke="#334155" stroke-width="2"/>
    <text x="993" y="418" fill="#E2E8F0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="600">HQ</text>
  </g>

  <g stroke="#38BDF8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M304 410H472"/>
    <path d="M452 396L472 410L452 424"/>
    <path d="M730 410H892"/>
    <path d="M872 396L892 410L872 424"/>
  </g>

  <g fill="#22D3EE">
    <rect x="526" y="503" width="33" height="43" rx="4"/>
    <rect x="563" y="514" width="33" height="32" rx="4"/>
    <rect x="600" y="508" width="33" height="38" rx="4"/>
    <rect x="637" y="520" width="33" height="26" rx="4"/>
  </g>
