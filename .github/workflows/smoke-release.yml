# Smoke test against a live release binary (main and tags).
name: Smoke (release)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: build and smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Run smoke against live server
        run: |
          DB=$(mktemp -u).db
          export APEX_EDGE_DB="$DB"
          ./target/release/apex-edge &
          PID=$!
          trap "kill $PID 2>/dev/null || true" EXIT
          sleep 2
          set -e
          curl -sf http://127.0.0.1:3000/health | grep -q '"status":"ok"'
          curl -sf http://127.0.0.1:3000/ready | grep -q '"status":"ready"'
          curl -sf -X POST http://127.0.0.1:3000/pos/command \
            -H "Content-Type: application/json" \
            -d '{"version":{"major":1,"minor":0,"patch":0},"idempotency_key":"00000000-0000-0000-0000-000000000001","store_id":"00000000-0000-0000-0000-000000000000","register_id":"00000000-0000-0000-0000-000000000000","payload":{"action":"create_cart","cart_id":null}}' \
            | grep -q '"success":true'
