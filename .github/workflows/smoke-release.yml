# Smoke test against a live Docker container (main and tags).
name: Smoke (release)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: docker build and smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t apex-edge:ci .

      - name: Run smoke against live container
        run: |
          docker run -d --name apex-edge-smoke -p 3000:3000 \
            -e APEX_EDGE_DB="sqlite:file:smoke_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}?mode=memory&cache=shared" \
            apex-edge:ci
          trap "docker logs apex-edge-smoke || true; docker rm -f apex-edge-smoke >/dev/null 2>&1 || true" EXIT

          # Wait for server readiness instead of fixed sleep.
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3000/health >/dev/null; then
              break
            fi
            sleep 1
          done

          set -e
          curl -sf http://127.0.0.1:3000/health | grep -q '"status":"ok"'
          curl -sf http://127.0.0.1:3000/ready | grep -q '"status":"ready"'
          curl -sf -X POST http://127.0.0.1:3000/pos/command \
            -H "Content-Type: application/json" \
            -d '{"version":{"major":1,"minor":0,"patch":0},"idempotency_key":"00000000-0000-0000-0000-000000000001","store_id":"00000000-0000-0000-0000-000000000000","register_id":"00000000-0000-0000-0000-000000000000","payload":{"action":"create_cart","cart_id":null}}' \
            | grep -q '"success":true'
