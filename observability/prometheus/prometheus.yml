global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/apex-edge-recording.yml

scrape_configs:
  - job_name: apex-edge
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3000
        labels:
          service: apex-edge
          environment: local

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
